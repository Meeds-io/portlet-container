name: Sonar Analysis
on:
  push:
    branches: [ stable/6.5.x-exo ]
  pull_request:

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar-analysis:
    name: Analyse Project with SonarCloud
    runs-on: ubuntu-latest
    steps:
      - name: Analyse Project
        uses: exo-actions/sonarcloud-action@v1
        with:
          extra_maven_opts: "-Dsonar.projectKey=io.meeds.gatein.pc" # Backwards compatibility with Meeds-io groupID change
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}